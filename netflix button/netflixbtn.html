<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix button</title>
    <link rel="stylesheet" href="style.css">

</head>
<style>

*{
    margin:50px;
    padding:15px;
    
}
.btn{
    position:relative;
    width: 290px;px;
    height:350px;
    border:2px solid black;
    background-color: black;
    border-radius: 8px;
    padding: 15px;

    display: flex;
    justify-content: center; 
    align-items: center;  
    
}

.left,
.middle,
.right{
    position:absolute;
    height:200px;
    width:20px;
}

.left{
    left:20px;
    background:#e50914;
}

.right{
    left: 120px;
    background:#e50914;
}

.middle{
    left:68px;;
    background:#b20710;
    transform:skewX(22deg);
    z-index:2;
}
</style>
<body>
    <div class="btn">
        <span class="left"></span>
        <span class="middle"></span>
        <span class="right"></span>
    </div>
</body>
</html>
